[platformio]
src_dir = .

[env:m5stack-core2]
platform  = espressif32
board     = m5stack-core2
framework = arduino

lib_deps =
    m5stack/M5Unified @ ^0.2.0
    m5stack/M5Unit-RFID @ ^0.0.1

monitor_speed = 115200

; ── Uncomment the env that matches your board ───────────────────────────────
; M5Stack Core (grey):
; board = m5stack-core-esp32

; M5Stack Core2 / Tough:
; board = m5stack-core2

; M5Stack CoreS3:
; board = m5stack-cores3
